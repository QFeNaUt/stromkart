<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Strømkart</title>
  <meta name="description" content="Sanntid spotpris, kraftflyt og magasinfylling for Norges fem prisområder." />

  <!-- Open Graph (Facebook, Messenger, Slack, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stromkart.no/" />
  <meta property="og:title" content="Strømkart" />
  <meta property="og:description" content="Sanntid spotpris, kraftflyt og magasinfylling for Norges fem prisområder." />
  <meta property="og:locale" content="nb_NO" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Strømkart" />
  <meta name="twitter:description" content="Sanntid spotpris, kraftflyt og magasinfylling for Norges fem prisområder." />

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* ---------- Grunntema ----------------------------------- */
    :root {
      --bg:        #0d1117;
      --panel:     rgba(22, 27, 34, 0.92);
      --border:    #30363d;
      --text:      #e6edf3;
      --text-dim:  #8b949e;
      --accent:    #58a6ff;

      /* Pris-gradient (lav → høy) */
      --c-low:    #10b981;
      --c-mid:    #eab308;
      --c-high:   #f97316;
      --c-vhigh:  #dc2626;

      /* Sonefarger */
      --zone-no1: #7cc4e8;
      --zone-no2: #7c8ee8;
      --zone-no3: #a07ce8;
      --zone-no4: #d67ce8;
      --zone-no5: #e87cc4;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); touch-action: manipulation; overflow: hidden; }
    body {
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      font-feature-settings: "tnum";
    }

    #map { position: absolute; inset: 0; }

    /* ---------- Paneler (Desktop) --------------------------- */
    .panel {
      position: absolute;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .panel h1 { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
    .subtitle {
      color: var(--text-dim); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 14px;
    }

    #info { top: 16px; left: 16px; min-width: 260px; }
    #legend { bottom: 16px; left: 16px; min-width: 220px; }
    #controls { top: 96px; right: 16px; padding: 8px 10px; min-width: 160px; }
    #controls .subtitle { margin-bottom: 6px; }

    .layer-toggle {
      display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 8px;
      cursor: pointer; user-select: none; color: var(--text); border-radius: 3px; transition: background 120ms ease;
    }
    .layer-toggle:hover { background: rgba(255, 255, 255, 0.05); }
    .layer-toggle input { margin: 0; accent-color: var(--accent); cursor: pointer; }

    /* ---------- Pris-tabell (Delt) -------------------------- */
    .prices-table { width: 100%; border-collapse: collapse; }
    .prices-table td { padding: 6px 0; font-variant-numeric: tabular-nums; }
    .prices-table tr + tr td { border-top: 1px solid #21262d; }
    .prices-table .zone { display: flex; align-items: center; gap: 8px; color: var(--text); }
    .prices-table .swatch { display: inline-block; width: 3px; height: 14px; border-radius: 1px; }
    .prices-table .price { text-align: right; color: var(--text); font-weight: 500; }
    .prices-table .unit { color: var(--text-dim); margin-left: 4px; font-weight: 400; }
    .prices-table .subprice { color: var(--text-dim); font-size: 11px; font-weight: 400; font-variant-numeric: tabular-nums; margin-top: 1px; }

    /* ---------- Legend (Delt) ------------------------------ */
    .legend-bar {
      height: 10px; border-radius: 2px;
      background: linear-gradient(to right, var(--c-low) 0%, var(--c-mid) 33%, var(--c-high) 67%, var(--c-vhigh) 100%);
    }
    .legend-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .legend-note { margin-top: 8px; font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.2px; }

    /* ---------- Desktop Tooltip ---------------------------- */
    .maplibregl-popup-content {
      background: var(--panel) !important; color: var(--text) !important; border: 1px solid var(--border);
      border-radius: 6px; padding: 0 !important; font-family: inherit; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      overflow: hidden; min-width: 220px;
    }
    .maplibregl-popup-tip { display: none; }
    .popup-accent { height: 3px; width: 100%; }
    .popup-body { padding: 10px 12px 11px 12px; }
    .popup-region { font-size: 12px; color: var(--text-dim); letter-spacing: 0.3px; }
    .popup-zone { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .popup-price { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; }
    .popup-price .unit { color: var(--text-dim); font-size: 11px; font-weight: 400; margin-left: 4px; }
    .popup-subprice { color: var(--text-dim); font-size: 11px; font-variant-numeric: tabular-nums; margin-top: 2px; }
    .popup-meta { color: var(--text-dim); font-size: 10.5px; margin-top: 6px; letter-spacing: 0.2px; }
    .popup-stale { color: #f59e0b; font-size: 11px; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.2px; }
    .popup-sparkline { display: block; width: 100%; height: 38px; margin-top: 8px; overflow: visible; }
    .status-err { color: #f85149; font-size: 11px; margin-top: 8px; }

    /* ---------- Skalaviser --------------------------------- */
    .maplibregl-ctrl-scale {
      background-color: rgba(22, 27, 34, 0.85) !important; border: 1px solid var(--border) !important;
      border-top: none !important; color: var(--text-dim) !important; font-size: 11px; padding: 2px 8px;
    }
    .pulse { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--c-low); margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ---------- Mobile Bottom Sheet ------------------------ */
    #bottom-sheet { display: none; }

    @media (max-width: 768px) {
      /* Skjul desktop UI */
      #info, #legend, #controls { display: none !important; }
      .maplibregl-popup { display: none !important; }
      /* Flytt skalaviser opp fra bunnen */
      .maplibregl-ctrl-bottom-right { bottom: 90px !important; transition: bottom 0.3s ease; }

      /* Bunnsheet struktur */
      #bottom-sheet {
        display: flex; flex-direction: column; position: absolute; bottom: 0; left: 0; right: 0;
        height: 90vh;  /* Fallback for eldre nettlesere */
        height: 90dvh; /* iOS Safari / Android Chrome: stabil med dynamisk adresselinje */
        background: var(--panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid var(--border); border-radius: 20px 20px 0 0;
        z-index: 100; box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
        /* Will be translated via JS */
        transform: translateY(100%);
        touch-action: none; /* Styrer swipe i containeren manuelt */
      }
      .sheet-handle-wrap {
        padding: 14px; display: flex; justify-content: center; cursor: grab; flex-shrink: 0;
      }
      .sheet-handle { width: 40px; height: 5px; background: #4b5563; border-radius: 3px; }
      
      .sheet-content {
        padding: 0 20px 20px; overflow-y: auto; flex-grow: 1; touch-action: pan-y;
      }

      /* Context Header for mobil tap */
      #sheet-context {
        padding-bottom: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--border);
      }
      #sheet-context-title { margin: 0 0 4px 0; font-size: 18px; font-weight: 600; }
      #sheet-context-desc { font-size: 14px; color: var(--text-dim); }

      /* Seksjoner inni sheetet */
      .sheet-section { margin-bottom: 24px; }
      .sheet-section .subtitle { margin-bottom: 12px; }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="info" class="panel">
    <h1>Strømkart Norge</h1>
    <div class="subtitle"><span class="pulse"></span>Sanntid · spotpris</div>
    <table id="prices" class="prices-table"><tbody>
      <tr><td colspan="2" style="color: var(--text-dim);">Laster…</td></tr>
    </tbody></table>
    <div id="error" class="status-err"></div>
  </div>

  <div id="legend" class="panel">
    <div class="subtitle" style="margin-bottom: 8px;">Spotpris (øre/kWh)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels"><span>0</span><span>50</span><span>100</span><span>150+</span></div>
    <div class="legend-note">Spotpris eks. mva og avgifter</div>
  </div>

  <div id="controls" class="panel">
    <div class="subtitle">Lag</div>
    <label class="layer-toggle"><input type="checkbox" id="toggle-spotpris" checked> <span>Spotpris</span></label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-flyt" checked> <span>Kraftflyt</span></label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-magasin" checked> <span>Magasinfylling</span></label>
  </div>

  <div id="bottom-sheet">
    <div class="sheet-handle-wrap" id="sheet-drag-zone">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-content" id="sheet-scroll-zone">
      <div id="sheet-context">
        <h2 id="sheet-context-title">Strømkart Norge</h2>
        <div id="sheet-context-desc">Velg et område i kartet, eller dra opp</div>
      </div>

      <div class="sheet-section">
        <div class="subtitle">Priser nå</div>
        <table id="prices-mobile" class="prices-table"><tbody>
          <tr><td colspan="2" style="color: var(--text-dim);">Laster…</td></tr>
        </tbody></table>
      </div>

      <div class="sheet-section">
        <div class="subtitle">Kartlag</div>
        <label class="layer-toggle"><input type="checkbox" id="toggle-spotpris-m" checked> <span>Spotpris</span></label>
        <label class="layer-toggle"><input type="checkbox" id="toggle-flyt-m" checked> <span>Kraftflyt</span></label>
        <label class="layer-toggle"><input type="checkbox" id="toggle-magasin-m" checked> <span>Magasinfylling</span></label>
      </div>

      <div class="sheet-section">
        <div class="subtitle">Fargeskala (øre/kWh)</div>
        <div class="legend-bar"></div>
        <div class="legend-labels"><span>0</span><span>50</span><span>100</span><span>150+</span></div>
      </div>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------
    // 0) Konfigurasjon
    // ---------------------------------------------------------
    const API_BASE = 'https://api.stromkart.no';

    // ---------------------------------------------------------
    // 1) Kart
    // ---------------------------------------------------------
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center: [12.5, 64.5],
      zoom: 3.8,
      attributionControl: { compact: true },
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: 'metric' }), 'bottom-right');

    let mapLoaded = false;
    map.on('load', () => {
      mapLoaded = true;
      if (!map.hasImage('flow-arrow')) map.addImage('flow-arrow', createArrowIcon(28));
      ['SE', 'FI', 'DK', 'DE', 'NL', 'GB'].forEach(code => {
        if (!map.hasImage(`flag-${code}`)) map.addImage(`flag-${code}`, createFlagIcon(code));
      });
      for (let pct = 0; pct <= 100; pct += 5) {
        const key = `battery-${pct}`;
        if (!map.hasImage(key)) map.addImage(key, createBatteryIcon(pct));
      }
      if (zonesData) addOverlays();
    });

    // ---------------------------------------------------------
    // 2) Mobile Bottom Sheet Logic
    // ---------------------------------------------------------
    const sheet = document.getElementById('bottom-sheet');
    const dragZone = document.getElementById('sheet-drag-zone');
    let sheetSnapPoints = { peek: 0, half: 0, full: 0 };
    let currentSheetState = 'peek';

    function initSheetGeometry() {
      if (window.innerWidth > 768) return;
      const h = sheet.getBoundingClientRect().height; // 90dvh
      sheetSnapPoints = {
        peek: h - 85, // Viser akkurat context-header
        half: h * 0.5,
        full: 0
      };
      setSheetState(currentSheetState, false);
    }

    function setSheetState(state, animate = true) {
      if (window.innerWidth > 768) return;
      currentSheetState = state;
      sheet.style.transition = animate ? 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)' : 'none';
      sheet.style.transform = `translateY(${sheetSnapPoints[state]}px)`;
    }

    window.addEventListener('resize', initSheetGeometry);
    setTimeout(initSheetGeometry, 100);

    let isDragging = false;
    let startY = 0;
    let startTransformY = 0;

    dragZone.addEventListener('touchstart', e => {
      isDragging = true;
      startY = e.touches[0].clientY;
      const matrix = new DOMMatrix(getComputedStyle(sheet).transform);
      startTransformY = matrix.m42;
      sheet.style.transition = 'none';
    }, {passive: true});

    dragZone.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dy = e.touches[0].clientY - startY;
      let newY = startTransformY + dy;
      if (newY < 0) newY = 0;
      if (newY > sheetSnapPoints.peek) newY = sheetSnapPoints.peek;
      sheet.style.transform = `translateY(${newY}px)`;
    }, {passive: true});

    dragZone.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false;
      const matrix = new DOMMatrix(getComputedStyle(sheet).transform);
      const endY = matrix.m42;

      let closest = 'peek';
      let minDist = Infinity;
      for (const [state, y] of Object.entries(sheetSnapPoints)) {
        const dist = Math.abs(endY - y);
        if (dist < minDist) { minDist = dist; closest = state; }
      }
      
      // Hvis vi smeller sheetet helt ned, fjern eventuell aktiv map-markering
      if (closest === 'peek') clearMobileSelection();
      setSheetState(closest);
    });

    // ---------------------------------------------------------
    // 3) Fargeskala og styling
    // ---------------------------------------------------------
    const PRICE_PAINT = [
      'interpolate', ['linear'], ['coalesce', ['get', 'price_ore_kwh'], -1],
      -1, '#374151', 0, '#10b981', 50, '#eab308', 100, '#f97316', 150, '#dc2626',
    ];
    const ZONE_COLORS = { NO1: '#7cc4e8', NO2: '#7c8ee8', NO3: '#a07ce8', NO4: '#d67ce8', NO5: '#e87cc4' };
    const ZONE_NAMES = { NO1: 'Øst-Norge', NO2: 'Sør-Norge', NO3: 'Midt-Norge', NO4: 'Nord-Norge', NO5: 'Vest-Norge' };
    const ZONE_LINE_PAINT = [
      'match', ['get', 'zoneName'],
      'NO1', ZONE_COLORS.NO1, 'NO2', ZONE_COLORS.NO2, 'NO3', ZONE_COLORS.NO3, 'NO4', ZONE_COLORS.NO4, 'NO5', ZONE_COLORS.NO5,
      '#6b7280',
    ];

    const CITIES = {
      type: 'FeatureCollection',
      features: [
        { type: 'Feature', properties: { name: 'Oslo' },         geometry: { type: 'Point', coordinates: [10.7522, 59.9139] } },
        { type: 'Feature', properties: { name: 'Bergen' },       geometry: { type: 'Point', coordinates: [ 5.3221, 60.3913] } },
        { type: 'Feature', properties: { name: 'Trondheim' },    geometry: { type: 'Point', coordinates: [10.3951, 63.4305] } },
        { type: 'Feature', properties: { name: 'Stavanger' },    geometry: { type: 'Point', coordinates: [ 5.7331, 58.9700] } },
        { type: 'Feature', properties: { name: 'Tromsø' },       geometry: { type: 'Point', coordinates: [18.9560, 69.6492] } },
        { type: 'Feature', properties: { name: 'Kristiansand' }, geometry: { type: 'Point', coordinates: [ 7.9956, 58.1599] } },
      ],
    };

    function priceColor(p) {
      if (p == null) return '#374151';
      if (p <= 50)  return '#10b981';
      if (p <= 100) return '#eab308';
      if (p <= 150) return '#f97316';
      return '#dc2626';
    }

    const FLOW_COLORS = { export: '#f97316', import: '#06b6d4', internal: '#9ca3af' };
    const FLOW_WIDTH = [
      'interpolate', ['linear'], ['coalesce', ['get', 'mw'], 0],
      0, 1.0, 50, 1.5, 400, 3.0, 1000, 5.0, 1400, 6.5,
    ];
    const FLOW_OPACITY = ['case', ['==', ['get', 'direction'], 'internal'], 0.55, 0.90];
    const FLOW_OPACITY_STALE = ['case', ['==', ['get', 'direction'], 'internal'], 0.35, 0.50];

    function createArrowIcon(size = 28) {
      const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0d1117'; ctx.beginPath(); ctx.moveTo(size*0.1, size*0.2); ctx.lineTo(size*0.95, size*0.5); ctx.lineTo(size*0.1, size*0.8); ctx.lineTo(size*0.28, size*0.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.moveTo(size*0.18, size*0.28); ctx.lineTo(size*0.85, size*0.5); ctx.lineTo(size*0.18, size*0.72); ctx.lineTo(size*0.34, size*0.5); ctx.closePath(); ctx.fill();
      return ctx.getImageData(0, 0, size, size);
    }

    function createFlagIcon(country) {
      const W = 24, H = 18; const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);
      ctx.save(); ctx.translate(1, 1);
      if (country === 'SE') { ctx.fillStyle = '#004B87'; ctx.fillRect(0, 0, 22, 16); ctx.fillStyle = '#FFCD00'; ctx.fillRect(7, 0, 3, 16); ctx.fillRect(0, 6, 22, 3); }
      else if (country === 'FI') { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, 22, 16); ctx.fillStyle = '#002F6C'; ctx.fillRect(7, 0, 3, 16); ctx.fillRect(0, 6, 22, 3); }
      else if (country === 'DK') { ctx.fillStyle = '#C60C30'; ctx.fillRect(0, 0, 22, 16); ctx.fillStyle = '#FFFFFF'; ctx.fillRect(7, 0, 3, 16); ctx.fillRect(0, 6, 22, 3); }
      else if (country === 'DE') { ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, 22, 5); ctx.fillStyle = '#DD0000'; ctx.fillRect(0, 5, 22, 6); ctx.fillStyle = '#FFCE00'; ctx.fillRect(0, 11, 22, 5); }
      else if (country === 'NL') { ctx.fillStyle = '#AE1C28'; ctx.fillRect(0, 0, 22, 5); ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 5, 22, 6); ctx.fillStyle = '#21468B'; ctx.fillRect(0, 11, 22, 5); }
      else if (country === 'GB') {
        ctx.fillStyle = '#012169'; ctx.fillRect(0, 0, 22, 16);
        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(22,16); ctx.moveTo(22,0); ctx.lineTo(0,16); ctx.stroke();
        ctx.strokeStyle = '#C8102E'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(22,16); ctx.moveTo(22,0); ctx.lineTo(0,16); ctx.stroke();
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(8, 0, 6, 16); ctx.fillRect(0, 5, 22, 6);
        ctx.fillStyle = '#C8102E'; ctx.fillRect(9, 0, 4, 16); ctx.fillRect(0, 6, 22, 4);
      }
      ctx.restore(); return ctx.getImageData(0, 0, W, H);
    }

    function createBatteryIcon(fillPercent) {
      const W = 24, H = 32; const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      const pct = Math.max(0, Math.min(100, Number(fillPercent) || 0));
      const NUB_W = 6, NUB_H = 3, BODY_X = 2, BODY_Y = NUB_H, BODY_W = 20, BODY_H = 27, FILL_PAD = 2;
      ctx.fillStyle = '#0d1117'; ctx.fillRect((W - NUB_W)/2 - 1, 0, NUB_W + 2, NUB_H + 1);
      ctx.fillStyle = '#e5e7eb'; ctx.fillRect((W - NUB_W)/2, 0, NUB_W, NUB_H);
      ctx.fillStyle = '#0d1117'; ctx.fillRect(BODY_X - 1, BODY_Y, BODY_W + 2, BODY_H + 1);
      ctx.fillStyle = '#e5e7eb'; ctx.fillRect(BODY_X, BODY_Y, BODY_W, BODY_H);
      ctx.fillStyle = '#1f2937'; ctx.fillRect(BODY_X + FILL_PAD, BODY_Y + FILL_PAD, BODY_W - 2*FILL_PAD, BODY_H - 2*FILL_PAD);
      const fillH = Math.round((BODY_H - 2*FILL_PAD) * pct / 100);
      if (fillH > 0) {
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(BODY_X + FILL_PAD, BODY_Y + FILL_PAD + (BODY_H - 2*FILL_PAD) - fillH, BODY_W - 2*FILL_PAD, fillH);
      }
      return ctx.getImageData(0, 0, W, H);
    }

    function buildFlowGeoJSON(payload) {
      if (!payload || !payload.edges) return { type: 'FeatureCollection', features: [] };
      const isNorwegian = (z) => z && z.startsWith('NO_');
      const features = [];
      for (const e of payload.edges) {
        if (!e.from_point || !e.to_point) continue;
        let direction = 'internal';
        if (e.kind !== 'internal') {
          if (isNorwegian(e.from) && !isNorwegian(e.to)) direction = 'export';
          else if (!isNorwegian(e.from) && isNorwegian(e.to)) direction = 'import';
        }
        features.push({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: [e.from_point, ...(Array.isArray(e.via_points) ? e.via_points : []), e.to_point] },
          properties: { id: e.id, from: e.from, to: e.to, mw: e.mw, kind: e.kind, cable: e.cable, direction, timestamp: e.timestamp },
        });
      }
      return { type: 'FeatureCollection', features };
    }

    function buildFlagGeoJSON(payload) {
      if (!payload || !payload.edges) return { type: 'FeatureCollection', features: [] };
      const isNorwegian = (z) => z && z.startsWith('NO_');
      const features = [];
      for (const e of payload.edges) {
        if (e.kind !== 'external' || !e.from_point || !e.to_point) continue;
        let foreignZone = !isNorwegian(e.from) ? e.from : (!isNorwegian(e.to) ? e.to : null);
        let foreignPoint = !isNorwegian(e.from) ? e.from_point : (!isNorwegian(e.to) ? e.to_point : null);
        if (!foreignZone) continue;
        const countryCode = foreignZone.split('_')[0];
        if (!['SE', 'FI', 'DK', 'DE', 'NL', 'GB'].includes(countryCode)) continue;
        features.push({
          type: 'Feature', geometry: { type: 'Point', coordinates: foreignPoint },
          properties: { country: countryCode, cable: e.cable || '' },
        });
      }
      return { type: 'FeatureCollection', features };
    }

    // ---------------------------------------------------------
    // Hent data
    // ---------------------------------------------------------
    async function fetchWithRetry(url, retries = 3, backoffMs = 2000) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (res.ok) return res;
          if ([502, 504, 530].includes(res.status)) {
            await new Promise(r => setTimeout(r, backoffMs)); continue;
          }
          return res;
        } catch (err) { await new Promise(r => setTimeout(r, backoffMs)); }
      }
      return fetch(url);
    }

    let todayPrices = {}; let zonesData = null; let flowsData = null; let flowsFlagsData = null; let reservoirsData = null;
    const ZONE_CENTROIDS = { 'NO_1': [10.5, 60.5], 'NO_2': [7.5, 58.8], 'NO_3': [10.5, 63.5], 'NO_4': [18.0, 68.5], 'NO_5': [6.5, 60.5] };
    
    let overlayHandlersAttached = false; let initialFitDone = false;
    let spotPriceVisible = true; let flowsVisible = true; let flowsIsStale = false; let reservoirsVisible = true;

    const zonePopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 8 });
    const flowPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 8 });

    async function loadData() {
      try {
        const errorDiv = document.getElementById('error'); errorDiv.textContent = '';
        const [zonesRes, pricesRes, todayRes, flowsRes, reservoirsRes] = await Promise.all([
          fetchWithRetry(`${API_BASE}/api/zones/`), fetchWithRetry(`${API_BASE}/api/prices/current`),
          fetchWithRetry(`${API_BASE}/api/prices/today`), fetchWithRetry(`${API_BASE}/api/flows/current`),
          fetchWithRetry(`${API_BASE}/api/reservoirs/current`),
        ]);

        if (!zonesRes.ok) throw new Error(`/api/zones failed`);
        if (!pricesRes.ok) throw new Error(`/api/prices/current failed`);

        const zones = await zonesRes.json();
        const prices = await pricesRes.json();
        todayPrices = todayRes.ok ? await todayRes.json() : {};
        const flows = flowsRes.ok ? await flowsRes.json() : null;
        reservoirsData = reservoirsRes.ok ? (await reservoirsRes.json()).areas : null;

        for (const f of zones.features) {
          const p = prices[f.properties.zoneName];
          if (p && p.price_ore_kwh != null) {
            f.properties.price_ore_kwh = p.price_ore_kwh; f.properties.price_eur_mwh = p.price_eur_mwh; f.properties.timestamp = p.timestamp;
          }
        }
        renderMap(zones); renderTable(zones, prices); renderFlows(flows);
        if (mapLoaded) addReservoirLayer();
      } catch (err) {
        document.getElementById('error').textContent = 'Venter på nettverk...'; console.error(err);
      }
    }

    function renderMap(zones) {
      zonesData = zones;
      if (mapLoaded) addOverlays();
      if (!initialFitDone) {
        // Mobil får ekstra padding nederst så sheetets peek-state (~85px) ikke klemmer Sør-Norge
        const isMobile = window.innerWidth <= 768;
        const padding = isMobile ? { top: 60, bottom: 110, left: 30, right: 30 } : 60;
        map.fitBounds([[3.0, 57.5], [32.0, 71.5]], { padding, duration: 800 });
        initialFitDone = true;
      }
    }

    function addOverlays() {
      if (!zonesData) return;
      const zonesSrc = map.getSource('zones');
      if (zonesSrc) zonesSrc.setData(zonesData);
      else map.addSource('zones', { type: 'geojson', data: zonesData });
      
      if (!map.getLayer('zones-fill')) map.addLayer({ id: 'zones-fill', type: 'fill', source: 'zones', paint: { 'fill-color': PRICE_PAINT, 'fill-opacity': 0.55 } });
      
      // Highlight-layers for mobil klikk (hvite rammer)
      if (!map.getLayer('zones-highlight')) {
        map.addLayer({
          id: 'zones-highlight', type: 'line', source: 'zones',
          filter: ['==', ['get', 'zoneName'], ''],
          paint: { 'line-color': '#ffffff', 'line-width': 2.5, 'line-opacity': 0.9 }
        });
      }
      if (!map.getLayer('zones-line')) map.addLayer({ id: 'zones-line', type: 'line', source: 'zones', paint: { 'line-color': ZONE_LINE_PAINT, 'line-opacity': 0.9, 'line-width': 1.5 } });

      if (!map.getSource('cities')) map.addSource('cities', { type: 'geojson', data: CITIES });
      if (!map.getLayer('cities-dot')) map.addLayer({ id: 'cities-dot', type: 'circle', source: 'cities', paint: { 'circle-radius': 3.5, 'circle-color': '#e6edf3', 'circle-stroke-color': '#0d1117', 'circle-stroke-width': 1.5 } });
      if (!map.getLayer('cities-label')) map.addLayer({ id: 'cities-label', type: 'symbol', source: 'cities', layout: { 'text-field': ['get', 'name'], 'text-font': ['Open Sans Semibold', 'Open Sans Regular'], 'text-size': 12, 'text-offset': [0.7, 0.15], 'text-anchor': 'left' }, paint: { 'text-color': '#f0f6fc', 'text-halo-color': '#0d1117', 'text-halo-width': 1.5 } });

      if (flowsData) addFlowLayers();
      if (reservoirsData) addReservoirLayer();
      updateOverlayVisibility();

      if (!overlayHandlersAttached) {
        // Desktop Hover
        map.on('mousemove', 'zones-fill', handleZoneHover);
        map.on('mouseleave', 'zones-fill', handleZoneLeave);
        map.on('mousemove', 'flows-line', handleFlowHover);
        map.on('mouseleave', 'flows-line', handleFlowLeave);
        
        // Mobile Click
        map.on('click', handleMapClick);
        overlayHandlersAttached = true;
      }
    }

    function renderFlows(payload) {
      flowsIsStale = payload?.is_stale === true;
      flowsData = buildFlowGeoJSON(payload);
      flowsFlagsData = buildFlagGeoJSON(payload);
      if (mapLoaded) addFlowLayers();
    }

    function addFlowLayers() {
      if (!flowsData) return;
      const src = map.getSource('flows');
      if (src) src.setData(flowsData); else map.addSource('flows', { type: 'geojson', data: flowsData });

      const beforeId = map.getLayer('cities-dot') ? 'cities-dot' : undefined;

      if (!map.getLayer('flows-highlight')) {
        map.addLayer({
          id: 'flows-highlight', type: 'line', source: 'flows',
          filter: ['==', ['get', 'id'], ''],
          paint: { 'line-color': '#ffffff', 'line-width': 5, 'line-opacity': 0.8 }
        }, beforeId);
      }

      if (!map.getLayer('flows-line')) map.addLayer({ id: 'flows-line', type: 'line', source: 'flows', layout: { 'line-cap': 'round', 'line-join': 'round' }, paint: { 'line-color': ['match', ['get', 'direction'], 'export', FLOW_COLORS.export, 'import', FLOW_COLORS.import, 'internal', FLOW_COLORS.internal, FLOW_COLORS.internal], 'line-width': FLOW_WIDTH } }, beforeId);
      if (!map.getLayer('flows-arrow')) map.addLayer({ id: 'flows-arrow', type: 'symbol', source: 'flows', layout: { 'symbol-placement': 'line-center', 'icon-image': 'flow-arrow', 'icon-rotation-alignment': 'map', 'icon-allow-overlap': true, 'icon-ignore-placement': true, 'icon-size': ['interpolate', ['linear'], ['coalesce', ['get', 'mw'], 0], 0, 0.55, 400, 0.85, 1400, 1.20] } }, beforeId);

      const lineOpacity = flowsIsStale ? FLOW_OPACITY_STALE : FLOW_OPACITY;
      map.setPaintProperty('flows-line', 'line-opacity', lineOpacity);
      map.setPaintProperty('flows-arrow', 'icon-opacity', lineOpacity);

      if (flowsFlagsData) {
        const flagSrc = map.getSource('flows-flags');
        if (flagSrc) flagSrc.setData(flowsFlagsData); else map.addSource('flows-flags', { type: 'geojson', data: flowsFlagsData });
        if (!map.getLayer('flows-flags-layer')) map.addLayer({ id: 'flows-flags-layer', type: 'symbol', source: 'flows-flags', layout: { 'icon-image': ['concat', 'flag-', ['get', 'country']], 'icon-size': 1, 'icon-offset': [0, -14], 'icon-allow-overlap': true, 'icon-ignore-placement': true } }, beforeId);
      }
    }

    function addReservoirLayer() {
      if (!reservoirsData) return;
      const features = [];
      for (const [zoneCode, info] of Object.entries(reservoirsData)) {
        const coords = ZONE_CENTROIDS[zoneCode];
        if (!coords || info.fill_percent == null) continue;
        const bucket = Math.round(info.fill_percent / 5) * 5;
        features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: coords }, properties: { zone: zoneCode, fill_percent: info.fill_percent, bucket, icon: `battery-${bucket}` } });
      }
      const geojson = { type: 'FeatureCollection', features };
      
      const src = map.getSource('reservoirs');
      if (src) src.setData(geojson); else map.addSource('reservoirs', { type: 'geojson', data: geojson });
      const beforeId = map.getLayer('cities-dot') ? 'cities-dot' : undefined;
      if (!map.getLayer('reservoirs-layer')) map.addLayer({ id: 'reservoirs-layer', type: 'symbol', source: 'reservoirs', layout: { 'icon-image': ['get', 'icon'], 'icon-size': 1, 'icon-allow-overlap': true, 'icon-ignore-placement': true } }, beforeId);
    }

    // ---------------------------------------------------------
    // Interaksjon
    // ---------------------------------------------------------
    function handleZoneHover(e) {
      if (window.innerWidth <= 768) return; // Desktop kun
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0], p = f.properties;
      const accent = ZONE_COLORS[p.zoneName] || '#6b7280', region = ZONE_NAMES[p.zoneName] || '';
      const timeStr = p.timestamp ? new Date(p.timestamp).toLocaleString('no-NO', { dateStyle: 'short', timeStyle: 'short' }) : '';
      zonePopup.setLngLat(e.lngLat).setHTML(`
        <div class="popup-accent" style="background:${accent}"></div>
        <div class="popup-body">
          <div class="popup-region">${region}</div><div class="popup-zone">${p.zoneName}</div>
          <div class="popup-price" style="color:${priceColor(p.price_ore_kwh)}">${p.price_ore_kwh != null ? p.price_ore_kwh.toFixed(1) : '—'}<span class="unit">øre/kWh</span></div>
          ${p.price_eur_mwh != null ? `<div class="popup-subprice">${p.price_eur_mwh.toFixed(2)} EUR/MWh</div>` : ''}
          ${renderSparkline(todayPrices[p.zoneName], accent)}
          ${timeStr ? `<div class="popup-meta">${timeStr}</div>` : ''}
        </div>
      `).addTo(map);
    }

    function handleZoneLeave() { if (window.innerWidth > 768) { map.getCanvas().style.cursor = ''; zonePopup.remove(); } }

    function handleFlowHover(e) {
      if (window.innerWidth <= 768) return; // Desktop kun
      map.getCanvas().style.cursor = 'pointer';
      const p = e.features[0].properties;
      const color = FLOW_COLORS[p.direction] || FLOW_COLORS.internal;
      const dirLbl = { export: 'Eksport', import: 'Import', internal: 'Internflyt' }[p.direction] || 'Flyt';
      flowPopup.setLngLat(e.lngLat).setHTML(`
        <div class="popup-accent" style="background:${color}"></div>
        <div class="popup-body">
          ${flowsIsStale ? '<div class="popup-stale">⚠ Bufret data</div>' : ''}
          ${p.cable ? `<div class="popup-region">${p.cable}</div>` : ''}
          <div class="popup-zone">${p.from} → ${p.to}</div>
          <div class="popup-price" style="color:${color}">${Number(p.mw).toFixed(0)}<span class="unit">MW</span></div>
          <div class="popup-subprice">${dirLbl}</div>
        </div>
      `).addTo(map);
    }

    function handleFlowLeave() { if (window.innerWidth > 768) { map.getCanvas().style.cursor = ''; flowPopup.remove(); } }

    // Mobil Klikk-håndtering
    function handleMapClick(e) {
      if (window.innerWidth > 768) return;

      // Defensiv filtrering: hvis brukeren tapper før alle lag er rendret,
      // unngå å sende lag-IDer som ikke finnes (MapLibre advarer / returnerer tomt).
      const candidateLayers = ['flows-arrow', 'flows-line', 'reservoirs-layer', 'zones-fill'];
      const layers = candidateLayers.filter(id => map.getLayer(id));
      if (!layers.length) return;
      const features = map.queryRenderedFeatures(e.point, { layers });

      if (!features.length) { clearMobileSelection(); return; }
      
      const f = features[0], p = f.properties;
      const titleEl = document.getElementById('sheet-context-title');
      const descEl = document.getElementById('sheet-context-desc');

      if (f.layer.id === 'zones-fill') {
        const zone = p.zoneName, region = ZONE_NAMES[zone] || '';
        const priceOre = p.price_ore_kwh != null ? p.price_ore_kwh.toFixed(1) : '—';
        const resInfo = reservoirsData ? reservoirsData[`NO_${zone.slice(2)}`] : null;
        const resTxt = resInfo && resInfo.fill_percent != null ? ` • Magasin: ${resInfo.fill_percent.toFixed(1)}%` : '';
        titleEl.textContent = `${region} (${zone})`;
        descEl.textContent = `Spotpris: ${priceOre} øre/kWh${resTxt}`;
        
        map.setFilter('zones-highlight', ['==', ['get', 'zoneName'], zone]);
        map.setFilter('flows-highlight', ['==', ['get', 'id'], '']);
      } 
      else if (f.layer.id.startsWith('flows-')) {
        const dirLbl = { export: 'Eksport', import: 'Import', internal: 'Internflyt' }[p.direction] || 'Flyt';
        titleEl.textContent = `Kraftflyt: ${p.from} → ${p.to}`;
        descEl.textContent = `${Math.round(p.mw)} MW ${dirLbl}${p.cable ? ` via ${p.cable}` : ''}`;
        
        map.setFilter('flows-highlight', ['==', ['get', 'id'], p.id]);
        map.setFilter('zones-highlight', ['==', ['get', 'zoneName'], '']);
      }
      else if (f.layer.id === 'reservoirs-layer') {
        const shortZone = p.zone.replace('_', ''), region = ZONE_NAMES[shortZone] || '';
        titleEl.textContent = `Magasin: ${region} (${shortZone})`;
        descEl.textContent = `${p.fill_percent.toFixed(1)}% fyllingsgrad`;
        
        map.setFilter('zones-highlight', ['==', ['get', 'zoneName'], shortZone]);
        map.setFilter('flows-highlight', ['==', ['get', 'id'], '']);
      }
      
      setSheetState('half');
    }

    function clearMobileSelection() {
      document.getElementById('sheet-context-title').textContent = 'Strømkart Norge';
      document.getElementById('sheet-context-desc').textContent = 'Velg et område i kartet, eller dra opp';
      if (map.getLayer('zones-highlight')) map.setFilter('zones-highlight', ['==', ['get', 'zoneName'], '']);
      if (map.getLayer('flows-highlight')) map.setFilter('flows-highlight', ['==', ['get', 'id'], '']);
      setSheetState('peek');
    }

    function renderSparkline(zoneSeries, accent) {
      if (!zoneSeries || !zoneSeries.prices || zoneSeries.prices.length < 2) return '';
      const W = 200, H = 40, padX = 2, padY = 4, times = zoneSeries.prices.map(d => new Date(d.timestamp).getTime()), prices = zoneSeries.prices.map(d => d.price_ore_kwh);
      const tMin = times[0], tMax = times[times.length - 1], pMin = Math.min(...prices), pMax = Math.max(...prices);
      const pRange = (pMax - pMin) || 1, tRange = (tMax - tMin) || 1;
      const xOf = t => padX + ((t - tMin) / tRange) * (W - padX*2), yOf = p => padY + (1 - (p - pMin) / pRange) * (H - padY*2);
      
      let line = ''; zoneSeries.prices.forEach((d, i) => { line += (i===0?'M':'L') + xOf(times[i]).toFixed(1) + ',' + yOf(prices[i]).toFixed(1) + ' '; });
      const bY = (H - padY).toFixed(1), area = line + `L${xOf(times[times.length-1]).toFixed(1)},${bY} L${xOf(times[0]).toFixed(1)},${bY} Z`;
      return `<svg class="popup-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${area}" fill="${accent}" fill-opacity="0.18"/><path d="${line}" stroke="${accent}" stroke-width="1.4" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
    }

    function renderTable(zones, prices) {
      const generateRows = () => {
        let html = '';
        ['NO1', 'NO2', 'NO3', 'NO4', 'NO5'].forEach(z => {
          const p = prices[z], priceOre = p?.price_ore_kwh != null ? p.price_ore_kwh : null, resInfo = reservoirsData ? reservoirsData[`NO_${z.slice(2)}`] : null;
          html += `<tr><td class="zone"><span class="swatch" style="background:${ZONE_COLORS[z]||'#6b7280'}"></span>${z}</td><td class="price" style="color:${priceColor(priceOre)}">${priceOre != null ? priceOre.toFixed(1) : '—'}<span class="unit">øre/kWh</span>${resInfo?.fill_percent != null ? `<div class="subprice">Magasin: ${resInfo.fill_percent.toFixed(1)} %</div>` : ''}</td></tr>`;
        });
        return html;
      };
      
      const rows = generateRows();
      document.querySelector('#prices tbody').innerHTML = rows;
      document.querySelector('#prices-mobile tbody').innerHTML = rows;
    }

    // ---------------------------------------------------------
    // Toggles (Synkroniserer Desktop & Mobil)
    // ---------------------------------------------------------
    function updateOverlayVisibility() {
      const zV = spotPriceVisible ? 'visible' : 'none';
      if (map.getLayer('zones-fill')) map.setLayoutProperty('zones-fill', 'visibility', zV);
      if (map.getLayer('zones-line')) map.setLayoutProperty('zones-line', 'visibility', zV);
      if (map.getLayer('zones-highlight')) map.setLayoutProperty('zones-highlight', 'visibility', zV);

      const fV = flowsVisible ? 'visible' : 'none';
      if (map.getLayer('flows-line')) map.setLayoutProperty('flows-line', 'visibility', fV);
      if (map.getLayer('flows-arrow')) map.setLayoutProperty('flows-arrow', 'visibility', fV);
      if (map.getLayer('flows-flags-layer')) map.setLayoutProperty('flows-flags-layer', 'visibility', fV);
      if (map.getLayer('flows-highlight')) map.setLayoutProperty('flows-highlight', 'visibility', fV);

      const rV = reservoirsVisible ? 'visible' : 'none';
      if (map.getLayer('reservoirs-layer')) map.setLayoutProperty('reservoirs-layer', 'visibility', rV);
    }

    function syncToggle(idBase, visible) {
      document.getElementById(`toggle-${idBase}`).checked = visible;
      document.getElementById(`toggle-${idBase}-m`).checked = visible;
    }

    function bindToggle(idBase, setter) {
      const handler = (e) => { const v = e.target.checked; setter(v); syncToggle(idBase, v); updateOverlayVisibility(); };
      document.getElementById(`toggle-${idBase}`).addEventListener('change', handler);
      document.getElementById(`toggle-${idBase}-m`).addEventListener('change', handler);
    }

    bindToggle('spotpris', v => { spotPriceVisible = v; if (!v) zonePopup.remove(); });
    bindToggle('flyt', v => { flowsVisible = v; if (!v) flowPopup.remove(); });
    bindToggle('magasin', v => { reservoirsVisible = v; });

    loadData(); setInterval(loadData, 5 * 60 * 1000);
  </script>
</body>
</html>
