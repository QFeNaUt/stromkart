<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strømkartet — prototype</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* ---------- Grunntema ----------------------------------- */
    :root {
      --bg:        #0d1117;
      --panel:     rgba(22, 27, 34, 0.92);
      --border:    #30363d;
      --text:      #e6edf3;
      --text-dim:  #8b949e;
      --accent:    #58a6ff;

      /* Pris-gradient (lav → høy) */
      --c-low:    #10b981;
      --c-mid:    #eab308;
      --c-high:   #f97316;
      --c-vhigh:  #dc2626;

      /* Sonefarger — analog kald palett, isoluminans (S=70%, L=70%, 30° hue-stride) */
      --zone-no1: #7cc4e8;  /* Øst-Norge   — hsl(200°) cyan-blå */
      --zone-no2: #7c8ee8;  /* Sør-Norge   — hsl(230°) blå */
      --zone-no3: #a07ce8;  /* Midt-Norge  — hsl(260°) lilla */
      --zone-no4: #d67ce8;  /* Nord-Norge  — hsl(290°) magenta */
      --zone-no5: #e87cc4;  /* Vest-Norge  — hsl(320°) rosa */
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
    body {
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Inter, "Helvetica Neue", sans-serif;
      font-feature-settings: "tnum";
      overflow: hidden;
    }

    #map { position: absolute; inset: 0; }

    /* ---------- Paneler ------------------------------------- */
    .panel {
      position: absolute;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .panel h1 {
      margin: 0 0 4px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .panel .subtitle {
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    #info {
      top: 16px;
      left: 16px;
      min-width: 260px;
    }

    #legend {
      bottom: 16px;
      left: 16px;
      min-width: 220px;
    }

    /* ---------- Kontrollpanel ------------------------------ */
    #controls {
      top: 96px;       /* under MapLibre NavigationControl */
      right: 16px;
      padding: 8px 10px;
      min-width: 160px;
    }
    #controls .subtitle {
      margin-bottom: 6px;
    }
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 5px 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
      border-radius: 3px;
      transition: background 120ms ease;
    }
    .layer-toggle:hover { background: rgba(255, 255, 255, 0.05); }
    .layer-toggle input {
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ---------- Pris-tabell --------------------------------- */
    #prices {
      width: 100%;
      border-collapse: collapse;
    }
    #prices td {
      padding: 6px 0;
      font-variant-numeric: tabular-nums;
    }
    #prices tr + tr td { border-top: 1px solid #21262d; }
    #prices .zone {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }
    #prices .swatch {
      display: inline-block;
      width: 3px;
      height: 14px;
      border-radius: 1px;
    }
    #prices .price {
      text-align: right;
      color: var(--text);
      font-weight: 500;
    }
    #prices .unit {
      color: var(--text-dim);
      margin-left: 4px;
      font-weight: 400;
    }
    #prices .subprice {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      margin-top: 1px;
    }

    /* ---------- Legend ------------------------------------- */
    .legend-bar {
      height: 10px;
      border-radius: 2px;
      background: linear-gradient(to right,
        var(--c-low) 0%,
        var(--c-mid) 33%,
        var(--c-high) 67%,
        var(--c-vhigh) 100%);
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .legend-note {
      margin-top: 8px;
      font-size: 10.5px;
      color: var(--text-dim);
      letter-spacing: 0.2px;
    }

    /* ---------- Tooltip ------------------------------------ */
    .maplibregl-popup-content {
      background: var(--panel) !important;
      color: var(--text) !important;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 !important;
      font-family: inherit;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      overflow: hidden;
      min-width: 220px;
    }
    .maplibregl-popup-tip { display: none; }
    .popup-accent {
      height: 3px;
      width: 100%;
    }
    .popup-body {
      padding: 10px 12px 11px 12px;
    }
    .popup-region {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }
    .popup-zone {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .popup-price {
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.2px;
    }
    .popup-price .unit {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 400;
      margin-left: 4px;
    }
    .popup-subprice {
      color: var(--text-dim);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .popup-meta {
      color: var(--text-dim);
      font-size: 10.5px;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }
    .popup-sparkline {
      display: block;
      width: 100%;
      height: 38px;
      margin-top: 8px;
      overflow: visible;
    }

    /* ---------- Status ------------------------------------- */
    .status-err { color: #f85149; font-size: 11px; margin-top: 8px; }

    /* ---------- Skalaviser (MapLibre ScaleControl) -------- */
    .maplibregl-ctrl-scale {
      background-color: rgba(22, 27, 34, 0.85) !important;
      border: 1px solid var(--border) !important;
      border-top: none !important;
      color: var(--text-dim) !important;
      font-size: 11px;
      padding: 2px 8px;
      font-variant-numeric: tabular-nums;
    }

    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-low);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="info" class="panel">
    <h1>Strømkart Norge</h1>
    <div class="subtitle"><span class="pulse"></span>Sanntid · spotpris</div>
    <table id="prices"><tbody>
      <tr><td colspan="2" style="color: var(--text-dim);">Laster…</td></tr>
    </tbody></table>
    <div id="error" class="status-err"></div>
  </div>

  <div id="legend" class="panel">
    <div class="subtitle" style="margin-bottom: 8px;">Spotpris (øre/kWh)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>0</span><span>50</span><span>100</span><span>150+</span>
    </div>
    <div class="legend-note">Spotpris eks. mva og avgifter</div>
  </div>

  <div id="controls" class="panel">
    <div class="subtitle">Lag</div>
    <label class="layer-toggle">
      <input type="checkbox" id="toggle-spotpris" checked>
      <span>Spotpris</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="toggle-flyt" checked>
      <span>Kraftflyt</span>
    </label>
  </div>

  <script>
    // ---------------------------------------------------------
    // 0) Konfigurasjon
    // ---------------------------------------------------------
    // Backend serveres separat fra Cloudflare Tunnel (LXC),
    // mens frontend hostes på Cloudflare Pages. Bytt linjen
    // under for lokal utvikling mot uvicorn på 127.0.0.1:8000.
    const API_BASE = 'https://api.stromkart.no';
    // const API_BASE = 'http://localhost:8000';  // dev

    // ---------------------------------------------------------
    // 1) Kart med CARTO Dark Matter
    // ---------------------------------------------------------
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center: [12.5, 64.5],
      zoom: 3.8,
      attributionControl: { compact: true },
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
    map.addControl(new maplibregl.ScaleControl({
      maxWidth: 120,
      unit: 'metric',
    }), 'bottom-right');

    // Flagg for å vite om kartet er klart til å ta imot lag
    let mapLoaded = false;
    map.on('load', () => {
      mapLoaded = true;
      if (zonesData) addOverlays();
    });

    // ---------------------------------------------------------
    // 2) Fargeskala og styling
    // ---------------------------------------------------------
    // Fargene følger nå øre/kWh — enheten nordmenn kjenner fra
    // strømregningen. Terskler: 0 (grønn) / 50 (gul) / 100 (oransje)
    // / 150+ (rød) øre/kWh. -1 er en "ingen data"-sentinel (grå).
    const PRICE_PAINT = [
      'interpolate', ['linear'],
      ['coalesce', ['get', 'price_ore_kwh'], -1],
      -1,  '#374151',
      0,   '#10b981',
      50,  '#eab308',
      100, '#f97316',
      150, '#dc2626',
    ];

    const ZONE_COLORS = {
      NO1: '#7cc4e8',
      NO2: '#7c8ee8',
      NO3: '#a07ce8',
      NO4: '#d67ce8',
      NO5: '#e87cc4',
    };
    
    const ZONE_NAMES = {
      NO1: 'Øst-Norge',
      NO2: 'Sør-Norge',
      NO3: 'Midt-Norge',
      NO4: 'Nord-Norge',
      NO5: 'Vest-Norge',
    };

    const ZONE_LINE_PAINT = [
      'match', ['get', 'zoneName'],
      'NO1', ZONE_COLORS.NO1,
      'NO2', ZONE_COLORS.NO2,
      'NO3', ZONE_COLORS.NO3,
      'NO4', ZONE_COLORS.NO4,
      'NO5', ZONE_COLORS.NO5,
      '#6b7280',
    ];

    const CITIES = {
      type: 'FeatureCollection',
      features: [
        { type: 'Feature', properties: { name: 'Oslo' },         geometry: { type: 'Point', coordinates: [10.7522, 59.9139] } },
        { type: 'Feature', properties: { name: 'Bergen' },       geometry: { type: 'Point', coordinates: [ 5.3221, 60.3913] } },
        { type: 'Feature', properties: { name: 'Trondheim' },    geometry: { type: 'Point', coordinates: [10.3951, 63.4305] } },
        { type: 'Feature', properties: { name: 'Stavanger' },    geometry: { type: 'Point', coordinates: [ 5.7331, 58.9700] } },
        { type: 'Feature', properties: { name: 'Tromsø' },       geometry: { type: 'Point', coordinates: [18.9560, 69.6492] } },
        { type: 'Feature', properties: { name: 'Kristiansand' }, geometry: { type: 'Point', coordinates: [ 7.9956, 58.1599] } },
      ],
    };

    // Tekstfarge for pris — samme terskler som fargeskalaen, i øre/kWh.
    function priceColor(p) {
      if (p == null) return '#374151';
      if (p <= 50)  return '#10b981';
      if (p <= 100) return '#eab308';
      if (p <= 150) return '#f97316';
      return '#dc2626';
    }

    // ---------------------------------------------------------
    // 2b) Kraftflyt — farger, tykkelse og geometri
    // ---------------------------------------------------------
    // Farge per "direction":
    //   export   = strøm forlater Norge (varm oransje)
    //   import   = strøm inn til Norge  (kjølig turkis)
    //   internal = mellom norske soner  (nøytral lilla)
    // Vi setter direction PER FEATURE i buildFlowGeoJSON, så MapLibre
    // kan style direkte med ['get', 'direction']. Dette er datadrevet
    // styling — ingen if/else i render-koden.
    const FLOW_COLORS = {
      export:   '#f97316',  // samme varme som "dyr pris"
      import:   '#06b6d4',  // cyan/turkis — tydelig kontrast til prisfargene
      internal: '#9ca3af',  // dempet grå-lilla — leses som "ikke ut/inn"
    };

    // Linjebredde mappet fra MW. Skala 50→1400 dekker både små internflyter
    // og NordLink/NSL-kabler ved full kapasitet (~1400 MW). Vi clamper i
    // begge ender så veldig små eller veldig store tall blir lesbare.
    const FLOW_WIDTH = [
      'interpolate', ['linear'], ['coalesce', ['get', 'mw'], 0],
      0,    1.0,
      50,   1.5,
      400,  3.0,
      1000, 5.0,
      1400, 6.5,
    ];

    // Internflyt får lavere opasitet — to grunner: (1) det er svakere "story"
    // enn import/eksport, så det skal ikke konkurrere visuelt; (2) opasitet
    // i kombinasjon med dempet farge gjør at piler IKKE leses som varme/kalde
    // (som vi reserverer for utlandskabler).
    const FLOW_OPACITY = [
      'case',
      ['==', ['get', 'direction'], 'internal'], 0.55,
      0.90,
    ];

    /**
     * Bygger en GeoJSON FeatureCollection av kraftflyt-edges fra backend.
     * Hver edge blir én LineString fra `from`-endepunkt til `to`-endepunkt,
     * med properties som driver styling og hover-tooltip.
     *
     * `direction` bestemmes her: edges der nøyaktig én ende er en norsk sone
     * blir "export" (NO→ute) eller "import" (ute→NO). Alt annet er "internal".
     */
    function buildFlowGeoJSON(payload) {
      if (!payload || !payload.edges || !payload.endpoints) {
        return { type: 'FeatureCollection', features: [] };
      }
      const { edges, endpoints } = payload;
      const isNorwegian = (z) => z && z.startsWith('NO_');

      const features = [];
      for (const e of edges) {
        const fromPt = endpoints[e.from];
        const toPt   = endpoints[e.to];
        if (!fromPt || !toPt) continue;  // mangler koordinat → hopp over

        let direction;
        if (e.kind === 'internal') {
          direction = 'internal';
        } else if (isNorwegian(e.from) && !isNorwegian(e.to)) {
          direction = 'export';  // strøm fra norsk sone til utlandet
        } else if (!isNorwegian(e.from) && isNorwegian(e.to)) {
          direction = 'import';  // strøm fra utlandet til norsk sone
        } else {
          direction = 'internal';  // skal i praksis ikke skje
        }

        features.push({
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: [fromPt, toPt],
          },
          properties: {
            id: e.id,
            from: e.from,
            to: e.to,
            mw: e.mw,
            kind: e.kind,
            cable: e.cable,
            direction,
            timestamp: e.timestamp,
          },
        });
      }
      return { type: 'FeatureCollection', features };
    }

    // ---------------------------------------------------------
    // NYTT: Robust Fetch-funksjon (Håndterer Altibox/Cloudflare-hikke)
    // ---------------------------------------------------------
    async function fetchWithRetry(url, retries = 3, backoffMs = 2000) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (res.ok) return res;
          
          // Hvis vi får en typisk tunnel-feil, vent og prøv på nytt
          if ([502, 504, 530].includes(res.status)) {
            console.warn(`[Tunnel-hikke] ${url} ga ${res.status}. Prøver på nytt om 2s...`);
            await new Promise(r => setTimeout(r, backoffMs));
            continue;
          }
          return res; // Returner andre feil (f.eks 404) direkte
        } catch (err) {
          console.warn(`[Nettverksfeil] ${url} feilet. Prøver på nytt om 2s...`);
          await new Promise(r => setTimeout(r, backoffMs));
        }
      }
      return fetch(url); // Siste forsøk
    }

    // ---------------------------------------------------------
    // 3) Hent data og rendér
    // ---------------------------------------------------------
    let todayPrices = {};
    let zonesData = null;
    let flowsData = null;
    let overlayHandlersAttached = false;
    let initialFitDone = false;
    let spotPriceVisible = true;
    let flowsVisible = true;

    const zonePopup = new maplibregl.Popup({
      closeButton: false, closeOnClick: false, offset: 8,
    });
    const flowPopup = new maplibregl.Popup({
      closeButton: false, closeOnClick: false, offset: 8,
    });

    async function loadData() {
      try {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = ''; // Tøm evt gammel feilmelding
        
        // Bruk den nye retry-funksjonen for å hente data
        const [zonesRes, pricesRes, todayRes, flowsRes] = await Promise.all([
          fetchWithRetry(`${API_BASE}/api/zones/`),
          fetchWithRetry(`${API_BASE}/api/prices/current`),
          fetchWithRetry(`${API_BASE}/api/prices/today`),
          fetchWithRetry(`${API_BASE}/api/flows/current`),
        ]);

        if (!zonesRes.ok)  throw new Error(`/api/zones returned ${zonesRes.status}`);
        if (!pricesRes.ok) throw new Error(`/api/prices/current returned ${pricesRes.status}`);
        if (!todayRes.ok)  console.warn(`/api/prices/today returned ${todayRes.status}`);
        // Flyt er en "nice to have" — hele kartet skal fungere selv om
        // ENTSO-E svikter for én eller flere grenser. Vi logger og går videre.
        if (!flowsRes.ok)  console.warn(`/api/flows/current returned ${flowsRes.status}`);

        const zones  = await zonesRes.json();
        const prices = await pricesRes.json();
        todayPrices  = todayRes.ok ? await todayRes.json() : {};
        const flows  = flowsRes.ok ? await flowsRes.json() : null;

        // Slå sammen pris inn i hver feature
        for (const f of zones.features) {
          const zoneName = f.properties.zoneName;
          const p = prices[zoneName];
          if (p && p.price_ore_kwh != null) {
            f.properties.price_ore_kwh = p.price_ore_kwh;
            f.properties.price_eur_mwh = p.price_eur_mwh;
            f.properties.timestamp     = p.timestamp;
          }
        }

        renderMap(zones);
        renderTable(zones, prices);
        renderFlows(flows);

      } catch (err) {
        document.getElementById('error').textContent = 'Venter på nettverk... Klarte ikke å hente ferske data.';
        console.error(err);
      }
    }

    function renderMap(zones) {
      zonesData = zones;
      
      // Bare tegn hvis kart-rammeverket er helt ferdig innlastet
      if (mapLoaded) {
        addOverlays();
      }

      if (!initialFitDone) {
        map.fitBounds([[3.0, 57.5], [32.0, 71.5]], { padding: 60, duration: 800 });
        initialFitDone = true;
      }
    }

    function addOverlays() {
      if (!zonesData) return;

      const zonesSrc = map.getSource('zones');
      if (zonesSrc) {
        zonesSrc.setData(zonesData);
      } else {
        map.addSource('zones', { type: 'geojson', data: zonesData });
      }
      
      if (!map.getLayer('zones-fill')) {
        map.addLayer({
          id: 'zones-fill',
          type: 'fill',
          source: 'zones',
          paint: {
            'fill-color': PRICE_PAINT,
            'fill-opacity': 0.55,
          },
        });
      }
      
      if (!map.getLayer('zones-line')) {
        map.addLayer({
          id: 'zones-line',
          type: 'line',
          source: 'zones',
          paint: {
            'line-color': ZONE_LINE_PAINT,
            'line-opacity': 0.9,
            'line-width': 1.5,
          },
        });
      }

      // Byer
      if (!map.getSource('cities')) {
        map.addSource('cities', { type: 'geojson', data: CITIES });
      }      if (!map.getLayer('cities-dot')) {
        map.addLayer({
          id: 'cities-dot',
          type: 'circle',
          source: 'cities',
          paint: {
            'circle-radius': 3.5,
            'circle-color': '#e6edf3',
            'circle-stroke-color': '#0d1117',
            'circle-stroke-width': 1.5,
          },
        });
      }
      if (!map.getLayer('cities-label')) {
        map.addLayer({
          id: 'cities-label',
          type: 'symbol',
          source: 'cities',
          layout: {
            'text-field': ['get', 'name'],
            'text-font': ['Open Sans Semibold', 'Open Sans Regular'],
            'text-size': 12,
            'text-offset': [0.7, 0.15],
            'text-anchor': 'left',
            'text-allow-overlap': false,
          },
          paint: {
            'text-color': '#f0f6fc',
            'text-halo-color': '#0d1117',
            'text-halo-width': 1.5,
            'text-halo-blur': 0.5,
          },
        });
      }

      // Kraftflyt: idempotent — lagene opprettes første gang og oppdateres
      // ved data-refresh. Krever at flowsData er satt (renderFlows kalles
      // fra loadData, og en evt. race vinnes av addOverlays når kartet
      // ferdiglastes etter at data har kommet inn).
      if (flowsData) addFlowLayers();

      updateOverlayVisibility();

      if (!overlayHandlersAttached) {
        map.on('mousemove', 'zones-fill', handleZoneHover);
        map.on('mouseleave', 'zones-fill', handleZoneLeave);
        map.on('mousemove', 'flows-line', handleFlowHover);
        map.on('mouseleave', 'flows-line', handleFlowLeave);
        overlayHandlersAttached = true;
      }
    }

    // -------------------------------------------------------------
    // Kraftflyt-rendering
    // -------------------------------------------------------------
    // Strategien er den samme som for soner: state lagres globalt
    // (`flowsData`), og lag/kilde opprettes/oppdateres via en idempotent
    // `addFlowLayers()` som kan kalles flere ganger uten å duplisere noe.
    function renderFlows(payload) {
      flowsData = buildFlowGeoJSON(payload);
      if (mapLoaded) addFlowLayers();
    }

    function addFlowLayers() {
      if (!flowsData) return;

      const src = map.getSource('flows');
      if (src) {
        src.setData(flowsData);
      } else {
        map.addSource('flows', { type: 'geojson', data: flowsData });
      }

      // Linje-lag: tegner selve flyt-strekene mellom endepunktene.
      // Plasseres OVER zones-fill (så pilene synes) men UNDER cities-label
      // (så bynavn ikke skjules). MapLibre's "beforeId" gir oss kontroll
      // over rekkefølgen uten å måtte fjerne og legge til alt på nytt.
      const beforeId = map.getLayer('cities-dot') ? 'cities-dot' : undefined;

      if (!map.getLayer('flows-line')) {
        map.addLayer({
          id: 'flows-line',
          type: 'line',
          source: 'flows',
          layout: {
            'line-cap':  'round',
            'line-join': 'round',
          },
          paint: {
            'line-color': [
              'match', ['get', 'direction'],
              'export',   FLOW_COLORS.export,
              'import',   FLOW_COLORS.import,
              'internal', FLOW_COLORS.internal,
              FLOW_COLORS.internal,
            ],
            'line-width':   FLOW_WIDTH,
            'line-opacity': FLOW_OPACITY,
          },
        }, beforeId);
      }

      // Pilhode-lag: symbol-lag med Unicode-trekant som auto-roteres
      // langs linjen. `symbol-placement: 'line-center'` legger ÉN pil
      // midt på hver strek — enkelt og leselig. For lange utlandskabler
      // kunne man brukt 'line' + 'symbol-spacing' for å få flere piler,
      // men én pil per edge er mer ryddig på et oversiktskart.
      if (!map.getLayer('flows-arrow')) {
        map.addLayer({
          id: 'flows-arrow',
          type: 'symbol',
          source: 'flows',
          layout: {
            'symbol-placement':   'line-center',
            'text-field':         '▶',
            'text-font':          ['Open Sans Regular'],
            'text-size': [
              'interpolate', ['linear'], ['coalesce', ['get', 'mw'], 0],
              0,    10,
              400,  14,
              1400, 18,
            ],
            'text-keep-upright':  false,  // la pilen rotere fritt med linja
            'text-rotation-alignment': 'map',
            'text-allow-overlap': true,
            'text-ignore-placement': true,
          },
          paint: {
            'text-color': [
              'match', ['get', 'direction'],
              'export',   FLOW_COLORS.export,
              'import',   FLOW_COLORS.import,
              'internal', FLOW_COLORS.internal,
              FLOW_COLORS.internal,
            ],
            'text-halo-color': '#0d1117',
            'text-halo-width': 1.5,
            'text-opacity': FLOW_OPACITY,
          },
        }, beforeId);
      }
    }

    function handleFlowHover(e) {
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const p = f.properties;
      const color = FLOW_COLORS[p.direction] || FLOW_COLORS.internal;
      const directionLabel = {
        export:   'Eksport',
        import:   'Import',
        internal: 'Internflyt',
      }[p.direction] || 'Flyt';
      const cableLine = p.cable ? `<div class="popup-region">${p.cable}</div>` : '';
      const timeStr = p.timestamp
        ? new Date(p.timestamp).toLocaleString('no-NO', { dateStyle: 'short', timeStyle: 'short' })
        : '';

      flowPopup
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-accent" style="background:${color}"></div>
          <div class="popup-body">
            ${cableLine}
            <div class="popup-zone">${p.from} → ${p.to}</div>
            <div class="popup-price" style="color:${color}">
              ${Number(p.mw).toFixed(0)}
              <span class="unit">MW</span>
            </div>
            <div class="popup-subprice">${directionLabel}</div>
            ${timeStr ? `<div class="popup-meta">${timeStr}</div>` : ''}
          </div>
        `)
        .addTo(map);
    }

    function handleFlowLeave() {
      map.getCanvas().style.cursor = '';
      flowPopup.remove();
    }

    function updateOverlayVisibility() {
      const zonesV = spotPriceVisible ? 'visible' : 'none';
      if (map.getLayer('zones-fill')) map.setLayoutProperty('zones-fill', 'visibility', zonesV);
      if (map.getLayer('zones-line')) map.setLayoutProperty('zones-line', 'visibility', zonesV);

      const flowsV = flowsVisible ? 'visible' : 'none';
      if (map.getLayer('flows-line'))  map.setLayoutProperty('flows-line',  'visibility', flowsV);
      if (map.getLayer('flows-arrow')) map.setLayoutProperty('flows-arrow', 'visibility', flowsV);
    }

    function setFlowsVisible(visible) {
      flowsVisible = visible;
      updateOverlayVisibility();
      if (!visible) flowPopup.remove();
    }

    function setSpotPriceVisible(visible) {
      spotPriceVisible = visible;
      updateOverlayVisibility();
      if (!visible) zonePopup.remove();
    }

    function handleZoneHover(e) {
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const zone = f.properties.zoneName;
      const priceOre = f.properties.price_ore_kwh;
      const priceEur = f.properties.price_eur_mwh;
      const ts = f.properties.timestamp;
      const accent = ZONE_COLORS[zone] || '#6b7280';
      const region = ZONE_NAMES[zone] || '';
      const timeStr = ts ? new Date(ts).toLocaleString('no-NO', { dateStyle: 'short', timeStyle: 'short' }) : '';
      const priceColorTxt = priceColor(priceOre);
      const sparkline = renderSparkline(todayPrices[zone], accent);
      
      zonePopup
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-accent" style="background:${accent}"></div>
          <div class="popup-body">
            <div class="popup-region">${region}</div>
            <div class="popup-zone">${zone}</div>
            <div class="popup-price" style="color:${priceColorTxt}">
              ${priceOre != null ? priceOre.toFixed(1) : '—'}
              <span class="unit">øre/kWh</span>
            </div>
            ${priceEur != null ? `<div class="popup-subprice">${priceEur.toFixed(2)} EUR/MWh</div>` : ''}
            ${sparkline}
            ${timeStr ? `<div class="popup-meta">${timeStr}</div>` : ''}
          </div>
        `)
        .addTo(map);
    }

    function handleZoneLeave() {
      map.getCanvas().style.cursor = '';
      zonePopup.remove();
    }

    function renderSparkline(zoneSeries, accent) {
      if (!zoneSeries || !Array.isArray(zoneSeries.prices) || zoneSeries.prices.length < 2) return '';
      const data = zoneSeries.prices;
      const W = 200, H = 40, padX = 2, padY = 4;
      const innerW = W - padX * 2, innerH = H - padY * 2;
      const times  = data.map(d => new Date(d.timestamp).getTime());
      const prices = data.map(d => d.price_ore_kwh);
      const tMin = times[0],  tMax = times[times.length - 1];
      const pMin = Math.min(...prices), pMax = Math.max(...prices);
      const pRange = (pMax - pMin) || 1;
      const tRange = (tMax - tMin) || 1;

      const xOf = t => padX + ((t - tMin) / tRange) * innerW;
      const yOf = p => padY + (1 - (p - pMin) / pRange) * innerH;

      let line = '';
      data.forEach((d, i) => {
        line += (i === 0 ? 'M' : 'L') + xOf(times[i]).toFixed(1) + ',' + yOf(prices[i]).toFixed(1) + ' ';
      });

      const bottomY = (H - padY).toFixed(1);
      const firstX  = xOf(times[0]).toFixed(1);
      const lastX   = xOf(times[times.length - 1]).toFixed(1);
      const area = line + `L${lastX},${bottomY} L${firstX},${bottomY} Z`;

      const nowMs = Date.now();
      let nowMarker = '';
      if (nowMs >= tMin && nowMs <= tMax) {
        nowMarker = `<line x1="${xOf(nowMs).toFixed(1)}" y1="${padY}" x2="${xOf(nowMs).toFixed(1)}" y2="${bottomY}" stroke="#f0f6fc" stroke-width="1" opacity="0.65"/>`;
      }

      let daySep = '';
      const firstDay = data[0].timestamp.slice(0, 10);
      for (let i = 1; i < data.length; i++) {
        if (data[i].timestamp.slice(0, 10) !== firstDay) {
          daySep = `<line x1="${xOf(times[i]).toFixed(1)}" y1="${padY}" x2="${xOf(times[i]).toFixed(1)}" y2="${bottomY}" stroke="${accent}" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>`;
          break;
        }
      }

      return `
        <svg class="popup-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <path d="${area}" fill="${accent}" fill-opacity="0.18"/>
          <path d="${line}" stroke="${accent}" stroke-width="1.4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          ${daySep}
          ${nowMarker}
        </svg>
      `;
    }

    function renderTable(zones, prices) {
      const tbody = document.querySelector('#prices tbody');
      tbody.innerHTML = '';
      const zoneOrder = ['NO1', 'NO2', 'NO3', 'NO4', 'NO5'];
      for (const z of zoneOrder) {
        const p = prices[z];
        const priceOre = p && p.price_ore_kwh != null ? p.price_ore_kwh : null;
        const priceEur = p && p.price_eur_mwh != null ? p.price_eur_mwh : null;
        const zoneCol  = ZONE_COLORS[z] || '#6b7280';
        const priceCol = priceColor(priceOre);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="zone">
            <span class="swatch" style="background:${zoneCol}"></span>
            ${z}
          </td>
          <td class="price" style="color:${priceCol}">
            ${priceOre != null ? priceOre.toFixed(1) : '—'}
            <span class="unit">øre/kWh</span>
            ${priceEur != null ? `<div class="subprice">${priceEur.toFixed(2)} EUR/MWh</div>` : ''}
          </td>
        `;
        tbody.appendChild(tr);
      }
    }

    document.getElementById('toggle-spotpris').addEventListener('change', (e) => {
      setSpotPriceVisible(e.target.checked);
    });
    document.getElementById('toggle-flyt').addEventListener('change', (e) => {
      setFlowsVisible(e.target.checked);
    });

    loadData();
    setInterval(loadData, 5 * 60 * 1000);
  </script>
</body>
</html>
